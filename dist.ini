name    = PAGI
author  = John Napiorkowski <jjnapiork@cpan.org>
license = Artistic_2_0
copyright_holder = John Napiorkowski
copyright_year   = 2026
abstract = The PAGI specification - Perl Asynchronous Gateway Interface
version = 0.002000

[@Basic]
[MetaJSON]

[MetaResources]
homepage = https://github.com/jjn1056/pagi
bugtracker.web  = https://github.com/jjn1056/pagi/issues
repository.web  = https://github.com/jjn1056/pagi
repository.url  = https://github.com/jjn1056/pagi.git
repository.type = git

; The examples/ are raw-protocol illustration apps, not indexable modules.
[MetaNoIndex]
directory = examples

[Prereqs::FromCPANfile]

; Generate PAGI::Spec::* POD from the spec markdown at build time
[Run::BeforeBuild]
run = perl script/build-spec-pod.pl --output-dir=_build_gen

[GatherDir / SpecPod]
root = _build_gen
prefix = lib

[PruneFiles]
match = ^_build_gen/
match = ^script/
filename = CLAUDE.md
match = \.DS_Store
match = ^docs/design/
match = ^docs/research/
match = ^docs/plans/

[Run::AfterBuild]
run = rm -rf _build_gen
